# made by kst - kstlolus@proton.me                     
# github : https://github.com/ksterajewicz/arch_linux_rice-beta1.2

# Colors
background              #0a0a0a
foreground              #e8e8e8
selection_background    #e8e8e8
selection_foreground    #0a0a0a

cursor                  #ffffff
cursor_text_color       #0a0a0a

url_color               #aaaaaa

active_border_color     #ffffff
inactive_border_color   #2a2a2a
bell_border_color       #666666

active_tab_foreground   #0a0a0a
active_tab_background   #e8e8e8
inactive_tab_foreground #555555
inactive_tab_background #111111

# Black
color0                  #0a0a0a
color8                  #333333

# Red → dark gray
color1                  #444444
color9                  #666666

# Green → mid gray
color2                  #555555
color10                 #777777

# Yellow → gray
color3                  #606060
color11                 #888888

# Blue → gray
color4                  #6a6a6a
color12                 #999999

# Magenta → gray
color5                  #747474
color13                 #aaaaaa

# Cyan → gray
color6                  #888888
color14                 #bbbbbb

# White
color7                  #c0c0c0
color15                 #f0f0f0

# Font
font_family         IosevkaTerm Nerd Font
bold_font           IosevkaTerm Nerd Font Bold
italic_font         IosevkaTerm Nerd Font Italic
bold_italic_font    IosevkaTerm Nerd Font Bold Italic
font_size           13.0
disable_ligatures   cursor

# Cursor
cursor_shape                beam
cursor_beam_thickness       1.5
cursor_blink_interval       0.8
cursor_stop_blinking_after  10.0

# Window
window_padding_width    18 22
placement_strategy      center
hide_window_decorations no
background_opacity      0.90
background_blur         1

# Scrollback 
scrollback_lines        10000
wheel_scroll_multiplier 5.0

# Performance 
repaint_delay   8
input_delay     2
sync_to_monitor yes

# Tabs 
tab_bar_style           separator
tab_bar_edge            top
tab_bar_min_tabs        1
tab_separator           " │ "
tab_title_template      "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal
tab_bar_margin_width    4
tab_bar_margin_height   4 0

# Sound 
enable_audio_bell    no
visual_bell_duration 0.0

# Mouse 
mouse_hide_wait   2.0
url_style         straight
open_url_with     default
detect_urls       yes

# Copying 
copy_on_select              clipboard
strip_trailing_spaces       smart
select_by_word_characters   @-./_~?&=%+#

# Shortcuts 
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+n        new_window_with_cwd
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+1              goto_tab 1
map ctrl+2              goto_tab 2
map ctrl+3              goto_tab 3
map ctrl+4              goto_tab 4
map ctrl+5              goto_tab 5
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0
map ctrl+shift+h        show_scrollback
map ctrl+shift+f5       load_config_file

# Shell integration 
shell_integration   enabled

# Misc 
update_check_interval   0
confirm_os_window_close 0
close_on_child_death    no
