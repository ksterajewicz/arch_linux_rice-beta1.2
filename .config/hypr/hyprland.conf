# made by kst - kstlolus@proton.me
# github: https://github.com/ksterajewicz/arch_linux_rice-beta1.2 

$mainMod      = SUPER
$terminal     = kitty
$filemanager  = thunar
$menu         = wofi --show drun
$browser      = brave
$lock         = hyprlock
$texteditor   = kitty nvim
$gamelauncher = steam

# Nvidia + Wayland + scaling
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = NVD_BACKEND,direct
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_SCALE,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = STEAM_FORCE_DESKTOPUI_SCALING,1

# Autostart
exec-once = waybar
exec-once = hyprpaper
exec-once = mako
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

xwayland {
    force_zero_scaling = true
}

# Monitors
monitor = eDP-1, 2560x1600@240, 0x0, 1.33
monitor = HDMI-A-3, 1920x1080@144, 1925x123, 1
monitor = , preferred, auto, 1

# Workspaces — laptop eDP-1
workspace = 1,  monitor:eDP-1, default:true
workspace = 2,  monitor:eDP-1
workspace = 3,  monitor:eDP-1
workspace = 4,  monitor:eDP-1
workspace = 5,  monitor:eDP-1
workspace = 6,  monitor:eDP-1
workspace = 7,  monitor:eDP-1
workspace = 8,  monitor:eDP-1
workspace = 9,  monitor:eDP-1
workspace = 10, monitor:eDP-1

# Workspaces — HDMI-A-3
workspace = 11, monitor:HDMI-A-3, default:true
workspace = 12, monitor:HDMI-A-3
workspace = 13, monitor:HDMI-A-3
workspace = 14, monitor:HDMI-A-3
workspace = 15, monitor:HDMI-A-3
workspace = 16, monitor:HDMI-A-3
workspace = 17, monitor:HDMI-A-3
workspace = 18, monitor:HDMI-A-3
workspace = 19, monitor:HDMI-A-3
workspace = 20, monitor:HDMI-A-3

input {
    kb_layout    = pl,us
    kb_options   = grp:alt_shift_toggle

    follow_mouse  = 1
    sensitivity   = 0
    accel_profile = flat

    touchpad {
        natural_scroll        = true
        disable_while_typing  = true
        tap-to-click          = true
        scroll_factor         = 0.5
    }
}

general {
    gaps_in      = 6
    gaps_out     = 12
    border_size  = 2

    # col.active_border   =
    # col.inactive_border =

    layout           = dwindle
    resize_on_border = true
    allow_tearing    = true
}


gesture = 3, horizontal, workspace
gesture = 4, horizontal, workspace

misc {
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    force_default_wallpaper      = 0
   # vfr                          = true
    vrr                          = 1
    mouse_move_enables_dpms      = true
    key_press_enables_dpms       = true
    enable_swallow               = true
    swallow_regex                = ^(kitty|Alacritty)$
    focus_on_activate            = false
    animate_manual_resizes       = false
    animate_mouse_windowdragging = false
}

cursor {
    no_hardware_cursors      = true
    enable_hyprcursor        = true
    warp_on_change_workspace = false
}

dwindle {
   # pseudotile           = true
    preserve_split       = true
    smart_split          = false
    smart_resizing       = true
    force_split          = 0
    special_scale_factor = 0.95
}

# Apps
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, R,      exec, $menu
bind = $mainMod, B,      exec, $browser
bind = $mainMod, N,      exec, $texteditor
bind = $mainMod, S,      exec, $gamelauncher

# Keyboard language
# Allows the user to switch between polish and english layout
bind = $mainMod, K, exec, hyprctl switchxkblayout all next

# Window control
bind = $mainMod,       Q, killactive
    #kills active window
bind = $mainMod,       V, togglefloating
    #enables floating on active window
bind = $mainMod,       F, fullscreen
    #makes active window go fullscreen
bind = $mainMod,       P, pseudo
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, D, exec, hyprctl dispatch togglespecialworkspace
    #allows the user to exit window which locks the cursor in. Example: games. Works like win+d on windows os. 

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Resize
binde = $mainMod ALT, left,  resizeactive, -40 0
binde = $mainMod ALT, right, resizeactive,  40 0
binde = $mainMod ALT, up,    resizeactive,   0 -40
binde = $mainMod ALT, down,  resizeactive,   0  40

# Workspace switching — per-monitor (r~N)
bind = $mainMod, 1, workspace, r~1
bind = $mainMod, 2, workspace, r~2
bind = $mainMod, 3, workspace, r~3
bind = $mainMod, 4, workspace, r~4
bind = $mainMod, 5, workspace, r~5
bind = $mainMod, 6, workspace, r~6
bind = $mainMod, 7, workspace, r~7
bind = $mainMod, 8, workspace, r~8
bind = $mainMod, 9, workspace, r~9
bind = $mainMod, 0, workspace, r~10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, r~1
bind = $mainMod SHIFT, 2, movetoworkspace, r~2
bind = $mainMod SHIFT, 3, movetoworkspace, r~3
bind = $mainMod SHIFT, 4, movetoworkspace, r~4
bind = $mainMod SHIFT, 5, movetoworkspace, r~5
bind = $mainMod SHIFT, 6, movetoworkspace, r~6
bind = $mainMod SHIFT, 7, movetoworkspace, r~7
bind = $mainMod SHIFT, 8, movetoworkspace, r~8
bind = $mainMod SHIFT, 9, movetoworkspace, r~9
bind = $mainMod SHIFT, 0, movetoworkspace, r~10

# Monitor focus
bind = $mainMod, period, focusmonitor, +1
bind = $mainMod, comma,  focusmonitor, -1

# Cycle workspaces
bind = $mainMod CTRL, left,  workspace, r-1
bind = $mainMod CTRL, right, workspace, r+1
bind = $mainMod, mouse_down, workspace, r+1
bind = $mainMod, mouse_up,   workspace, r-1

# Mouse drag
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = , PRINT, exec, hyprshot -m region --clipboard-only
bind = $mainMod, PRINT, exec, hyprshot -m region -o /home/kst/Screenshots

# AsusRog upper keys
binde =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  =, XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bind  =, XF86AudioMicMute,     exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86Launch1, exec, rog-control-center
bind = , XF86Launch4, exec, asusctl profile -n

# Media
bind =, XF86AudioPlay,  exec, playerctl play-pause
bind =, XF86AudioPause, exec, playerctl play-pause
bind =, XF86AudioNext,  exec, playerctl next
bind =, XF86AudioPrev,  exec, playerctl previous

# Brightness
binde =, XF86MonBrightnessUp,   exec, brightnessctl set +5%
binde =, XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Window rules
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(thunar)$, match:title ^(File Operation Progress)$, float on
windowrule = match:title ^(Open File)$, float on
windowrule = match:title ^(Save File|Save As)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size 480 270
windowrule = match:title ^(Picture-in-Picture)$, move 100%-490 100%-280
windowrule = match:class ^(gamescope)$, immediate on
windowrule = match:class ^(.*\.exe)$, immediate on

# Layer rules
layerrule = match:namespace ^(waybar)$, blur on
layerrule = match:namespace ^(waybar)$, ignore_alpha 0.5
layerrule = match:namespace ^(notifications)$, blur on
layerrule = match:namespace ^(notifications)$, ignore_alpha 0.5
layerrule = match:namespace ^(notifications)$, animation slide
layerrule = match:namespace ^(wofi)$, blur on
layerrule = match:namespace ^(wofi)$, ignore_alpha 0.5
layerrule = match:namespace ^(wofi)$, animation popin 80%
