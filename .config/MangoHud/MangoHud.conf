################################################################################
#   ~/.config/MangoHud/MangoHud.conf
#   Gaming diagnostics — small, dark, readable
################################################################################

# ─── POSITION & SIZE ──────────────────────────────────────────────────────
position=top-left
font_size=18
table_columns=14
gpu_text=GPU
cpu_text=CPU
round_corners=8

# ─── TOGGLE KEYS ──────────────────────────────────────────────────────────
toggle_hud=Shift_R+F12
toggle_fps_limit=Shift_L+F1
toggle_logging=Shift_L+F2
reload_cfg=Shift_L+F4

# ─── FRAME PERFORMANCE (najważniejsze pod GPU diagnostykę) ───────────────
fps
fps_limit=0,60,144,240
frame_timing=1
fps_color_change
fps_value=30,60,120
fps_color=ff0055,ffe066,00ff9c

# ─── GPU ──────────────────────────────────────────────────────────────────
gpu_stats
gpu_temp
gpu_core_clock
gpu_mem_clock
gpu_power
vram
gpu_load_change
gpu_load_value=60,90
gpu_load_color=00ff9c,ffe066,ff0055

# ─── CPU ──────────────────────────────────────────────────────────────────
cpu_stats
cpu_temp
cpu_power
cpu_mhz
cpu_load_change
cpu_load_value=60,90
cpu_load_color=00ff9c,ffe066,ff0055

# Per-core (przydatne ale rzadko, włącz w razie problemów)
# core_load
# core_load_change

# ─── RAM / IO ─────────────────────────────────────────────────────────────
ram
swap
io_read
io_write

# ─── PROCES / GRA ─────────────────────────────────────────────────────────
engine_version
vulkan_driver
wine
gamemode
exec_name
arch

# ─── LATENCY (krytyczne dla FPS gier) ────────────────────────────────────
present_mode
gpu_voltage

# ─── NETWORK / BATTERY (laptop) ──────────────────────────────────────────
battery
network=wlo1

# ─── HUD STYLING — czarno-biały glassy ───────────────────────────────────
background_alpha=0.55
alpha=0.85
background_color=0a0a0a
text_color=e8e8e8
gpu_color=e8e8e8
cpu_color=e8e8e8
vram_color=b0b0b0
ram_color=b0b0b0
engine_color=909090
io_color=909090
frametime_color=ffffff
media_player_color=909090

# ─── LOGGING (do późniejszej analizy) ────────────────────────────────────
output_folder=/home/kst/MangoHudLogs
log_duration=60
autostart_log=0
log_interval=100
log_versioning
